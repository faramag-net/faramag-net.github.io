<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paletas Santa Rosa</title>

<style>
.contenedor {
  position: relative;
  width: 100%;
  height: 500px;
  margin-top: 50px;
}

.logo {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
}

.producto {
  position: absolute;
  text-align: center;
}

.producto img {
  width: 120px;
  border-radius: 15px;
}

/* posiciones alrededor */

.p1 {
  top: 10%;
  left: 40%;
}

.p2 {
  top: 60%;
  left: 10%;
}

.p3 {
  top: 60%;
  right: 10%;
}
</style>
</head>

<body>

<h1>🍦 Paletas Santa Rosa</h1>
<p>Paletas artesanales con fruta natural</p>

<div class="contenedor">

  <img src="imagenes/logo.png" class="logo">

  <div class="producto p1">
    <img src="imagenes/mango.jpg">
    <p>Mango</p>
  </div>

  <div class="producto p2">
    <img src="imagenes/fresa.png">
    <p>Fresa</p>
  </div>

  <div class="producto p3">
    <img src="imagenes/otro.jpg">
    <p>Chocolate</p>
  </div>

</div>

</body>
</html>
