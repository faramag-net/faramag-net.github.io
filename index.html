<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paletas Santa Rosa</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #fff8f0;
}

/* LOGO */
.logo {
  width: 180px;
  margin: 20px auto;
  display: block;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 20px;
}

/* PRODUCTO */
.producto {
  background: white;
  border-radius: 15px;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.producto img {
  width: 100%;
  border-radius: 15px;
}
</style>
</head>

<body>

<img src="imagenes/logo.png" class="logo">

<h1>🍦 Paletas Santa Rosa</h1>
<p>Paletas artesanales con fruta natural</p>

<div class="grid">

  <div class="producto">
    <img src="imagenes/mango.jpg">
    <p>Mango - $20</p>
  </div>

  <div class="producto">
    <img src="imagenes/fresa.png">
    <p>Fresa - $20</p>
  </div>

  <div class="producto">
    <img src="imagenes/otro.jpg">
    <p>Chocolate - $20</p>
  </div>

  <div class="producto">
    <img src="imagenes/mango.jpg">
    <p>Limón - $20</p>
  </div>

  <div class="producto">
    <img src="imagenes/fresa.png">
    <p>Vainilla - $20</p>
  </div>

  <div class="producto">
    <img src="imagenes/otro.jpg">
    <p>Coco - $20</p>
  </div>

</div>

</body>
</html>
