<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
 
    <title>Visitas</title>
    
<link
    rel="stylesheet"
    href="../../styles/global.css"
/>

<link
    rel="stylesheet"
    href="../../styles/crm.css"
/>

<link
    rel="stylesheet"
    href="../../components/navbar.css">
    
</head>

<body>

<div id="navbar"></div>
    
<div class="crm-dashboard">

    <div class="card kpi-card">

        <h3>
            💵 Vendido Hoy
        </h3>

        <p id="montoVendido">
            $0
        </p>

    </div>

    <div class="card kpi-card">

        <h3>
            📅 Visitas Pendientes
        </h3>

        <p id="visitasPendientes">
            0
        </p>

    </div>

</div>

<div
    class="form-cliente"
    style="display:none;"
>

    <input
        id="clienteNombre"
        placeholder="Nombre"
    >

    <input
        id="clienteTelefono"
        placeholder="Teléfono"
    >

    <input
        id="clienteDireccion"
        placeholder="Dirección"
    >

    <button onclick="crearCliente()">

        Guardar Cliente

    </button>

</div>

<div class="clientes-toolbar">

    <input
        id="buscarCliente"
        placeholder="🔍 Buscar cliente..."
    >

    <select id="filtroConsignacion">

        <option value="todos">
            Todos
        </option>

        <option value="abierta">
            Consignación Abierta
        </option>

        <option value="cerrada">
            Sin Consignación
        </option>

    </select>

    <button
        class="btn-add-cliente"
        onclick="openCrearClienteModal()"
    >
        +
    </button>

</div>

<div id="listaClientes"></div>

<script
    type="module"
    src="./index.js">
</script>

            <script type="module">
            
            import {
                crearNavbar
            }
            from "../../components/navbar.js";
            
            document
            .getElementById("navbar")
            .innerHTML =
            crearNavbar();
            
            </script> 
    
    </body>

</html>
