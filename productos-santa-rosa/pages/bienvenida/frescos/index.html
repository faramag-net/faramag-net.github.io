<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Productos Frescos Santa Rosa
    </title>

    <link
        rel="stylesheet"
        href="./frescos.css"
    >

</head>

<body>

<header class="header">

    <div class="logo">

        <img
            src="../../../imagenes/logosantarosa.png.png"
            alt="Santa Rosa"
        >

    </div>

    <nav class="menu">

        <a href="#">
            Inicio
        </a>

        <a href="#productos">
            Productos
        </a>

        <a href="#">
            Contacto
        </a>

    </nav>

</header>

<section class="hero">

    <div class="hero-texto">

        <h1>
            Jitomate Fresco
        </h1>

        <p>

            Cultivado con dedicación y cuidado.

            Productos frescos directamente
            del campo para tu negocio.

        </p>

    </div>

    <div class="hero-imagen">

        <img
            src="../../../imagenes/jitomate.jpg"
            alt="Jitomate"
        >

    </div>

</section>

<section
    id="productos"
    class="productos"
>

    <h2>
        Nuestros Productos
    </h2>

    <div class="productos-grid">

        <article class="producto">

            <img
                src="../../../imagenes/jitomate.jpg"
                alt=""
            >

            <h3>
                Jitomate Saladet
            </h3>

            <p>
                Fresco y natural.
            </p>

        </article>

    </div>

</section>

<footer>

    Productos Santa Rosa

</footer>

<script src="./frescos.js"></script>

</body>
</html>
