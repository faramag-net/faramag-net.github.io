<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Inventario</title>
    
    <link
    rel="stylesheet"
    href="../../styles/global.css">

    <link
    rel="stylesheet"
    href="../../components/navbar.css">

    <link
    rel="stylesheet"
    href="inventario.css">

    </head>
    
    <body>   
        
     <div id="navbar"></div>

    <div class="container">
    
  <h1>📦 Inventario Santa Rosa</h1>

  
        
<div class="panel">

    <h2>📦 Agregar Producto</h2>

    <input
    type="text"
    id="nuevoProducto"
    placeholder="Nombre producto">

    <input
    type="number"
    id="nuevoPrecio"
    placeholder="Precio">

    <input
    type="number"
    id="nuevoCosto"
    placeholder="Costo">

    <input
    type="number"
    id="nuevoStock"
    placeholder="Stock inicial">

    <button onclick="agregarProducto()">

        ➕ Agregar Producto

    </button>

</div>     
       
<div class="panel">

    <h2>📥 Movimiento Inventario</h2>

            <table class="tabla-productos">

    <thead>
        <tr>
            <th>Producto</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acción</th>
        </tr>
    </thead>

    <tbody id="tablaProductos">

    </tbody>

</table> 

    <select id="productoInventario"></select>

    <select id="tipoMovimiento">

        <option value="ENTRADA">

            ENTRADA

        </option>

        <option value="MERMA">

            MERMA

        </option>

        <option value="CORTESIA">

            CORTESIA

        </option>

    </select>

    <input
    type="number"
    id="agregarStock"
    placeholder="Cantidad">

    <button onclick="agregarInventario()">

        Registrar Movimiento

    </button>

</div>

<div class="panel">

    <h2>📋 Historial Inventario</h2>

    <div class="table-responsive">

        <table>

            <thead>

                <tr>

                    <th>TIPO</th>
                    <th>PRODUCTO</th>
                    <th>CANTIDAD</th>
                    <th>STOCK</th>
                    <th>FECHA</th>

                </tr>

            </thead>

            <tbody id="tablaInventario"></tbody>

        </table>

    </div>

    <br>

    <button
    class="btn-exportar"
    onclick="exportarJSON()">

    💾 Exportar JSON

    </button>

    <input
    type="file"
    id="importarArchivo"
    hidden
    onchange="importarJSON(event)">

    <button
    class="btn-importar"
    onclick="
    document
    .getElementById('importarArchivo')
    .click()
    ">

    📂 Importar JSON

    </button>

    <button
    class="btn-eliminar"
    onclick="cerrarInventario()">

    🗑 Cerrar Inventario

    </button>

</div>
        
</div>
        
<script type="module">

import {
    crearNavbar
}
from "../../components/navbar.js";

document
.getElementById("navbar")
.innerHTML =
crearNavbar();

</script> 
    
<script
type="module"
src="inventario.js">
</script>
        
</body>

</html>
