<div class="insumos-page">

    <!-- HEADER -->
    <header class="insumos-header">
        <h1>🛒 INSUMOS</h1>
        <p>Registro rápido de compras</p>
    </header>

    <!-- KPIS -->
    <section class="kpis">

        <div class="kpi-card">
            <span class="kpi-icon">💰</span>
            <span class="kpi-label">Total General</span>
            <strong id="kpiTotal">$0.00</strong>
        </div>

        <div class="kpi-card">
            <span class="kpi-icon">👨</span>
            <span class="kpi-label">Fara</span>
            <strong id="kpiFara">$0.00</strong>
        </div>

        <div class="kpi-card">
            <span class="kpi-icon">👩</span>
            <span class="kpi-label">Martha</span>
            <strong id="kpiMartha">$0.00</strong>
        </div>

    </section>

    <!-- FORMULARIO -->
    <section class="insumos-form">

        <div class="form-row">

            <div class="form-group">
                <label>Producto</label>
                <input type="text" id="producto">
            </div>

            <div class="form-group">
                <label>Presentación</label>
                <input type="text" id="presentacion">
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>Tienda</label>
                <input type="text" id="tienda">
            </div>

            <div class="form-group">
                <label>Comprador</label>
                <select id="comprador">
                    <option>Martha</option>
                    <option>Fara</option>
                    <option>Ambos</option>
                    <option>Otro</option>
                </select>
            </div>

        </div>

        <div
            class="form-group"
            id="otroCompradorContainer"
            style="display:none;"
        >
            <label>Nombre comprador</label>
            <input type="text" id="compradorNombre">
        </div>

        <div class="form-group">
            <label>Contacto</label>
            <input type="text" id="contacto">
        </div>

        <div class="form-row">

            <div class="form-group">
                <label>Cantidad</label>
                <input type="number" id="cantidad">
            </div>

            <div class="form-group">
                <label>Total</label>
                <input type="number" id="total">
            </div>

        </div>

        <div class="form-group">
            <label>Comentarios</label>
            <textarea id="comentarios"></textarea>
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <input
                type="text"
                id="direccion"
                readonly
            >
        </div>

        <div class="acciones">

            <button id="btnGeolocalizar">
                📍 Geolocalizar
            </button>

            <button id="btnGuardar">
                💾 Guardar
            </button>

        </div>

    </section>

    <!-- HISTORIAL -->
    <section class="historial">

        <button id="toggleHistorial">
            ▶ Historial (0)
        </button>

        <div id="historialContainer">

            <div class="historial-tools">

                <input
                    type="text"
                    placeholder="Buscar..."
                    id="buscarHistorial"
                >

                <button>📥 Importar</button>
                <button>📤 Exportar</button>
                <button>🗑 Eliminar</button>

            </div>

            <div class="tabla-wrapper">

                <table>

                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Producto</th>
                            <th>Present.</th>
                            <th>Total</th>
                            <th>Tienda</th>
                            <th>Comprador</th>
                            <th>Contacto</th>
                            <th>Long.</th>
                            <th>Lat.</th>
                            <th>Dirección</th>
                            <th>Comentarios</th>
                        </tr>
                    </thead>

                    <tbody id="tablaInsumos">
                    </tbody>

                </table>

            </div>

        </div>

    </section>

</div>
