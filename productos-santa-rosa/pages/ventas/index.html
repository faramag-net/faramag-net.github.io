<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Ventas</title>

    <link
    rel="stylesheet"
    href="../../styles/global.css">

    <link
    rel="stylesheet"
    href="../../components/navbar.css">

    <link
    rel="stylesheet"
    href="ventas.css">
    
</head>

<body>

    <div id="navbar"></div>
    
    <div class="container">

    
    <h1>💰 Sistema de Ventas</h1>

    <!-- KPI CARDS -->

    <div class="resumen">

        <div class="card">

            <h3>Total Vendido</h3>

            <p id="totalVentas">$0</p>

        </div>

        <div class="card">

            <h3>Ganancia Total</h3>

            <p id="totalGanancia">$0</p>

        </div>

    </div>

        <div class="panel">

    <h2>

        📦 Existencias

    </h2>

    <div
    id="stockCards"
    class="stock-grid">

    </div>

</div>

    <!-- REGISTRAR VENTA -->

    <div class="panel">

        <h2>🛒 Registrar Venta</h2>

        <select
        id="producto"
        onchange="actualizarProducto()">
        </select>

        <input
        type="text"
        id="cliente"
        placeholder="Cliente">

        <div class="cantidad">

            <button
            onclick="cambiarCantidad(-1)">
            -
            </button>

            <input
            type="number"
            id="cantidad"
            value="1"
            onchange="actualizarSubtotal()">

            <button
            onclick="cambiarCantidad(1)">
            +
            </button>

        </div>

        <input
        type="hidden"
        id="precio">

        <input
        type="hidden"
        id="costo">

        <button
        onclick="registrarVenta()">

        Registrar Venta

        </button>
     
        </div>   
        
        <h3 id="subtotalVista">

            SUBTOTAL: $0

        </h3> 
        
<!-- COMANDA -->

<div class="panel">

    <h2>🧾 Comanda Actual</h2>

    <table>

        <thead>

            <tr>

                <th>PRODUCTO</th>
                <th>CANTIDAD</th>
                <th>PRECIO</th>
                <th>SUBTOTAL</th>
                <th>ACCION</th>

            </tr>

        </thead>

        <tbody id="tablaComanda"></tbody>

    </table>

    <h2 id="totalComanda">

        TOTAL: $0

    </h2>

    <div class="acciones-comanda">

        <button onclick="agregarComanda()">

            ➕ Agregar Comanda

        </button>

        <button onclick="registrarComanda()">

            ✅ Registrar Comanda

        </button>

    </div>
    
        </div>
    
    <!-- HISTORIAL -->

    <div class="panel">

        <h2>📋 Historial Ventas</h2>

        <table>

            <thead>

                <tr>

                    <th>PRODUCTO</th>
                    <th>CLIENTE</th>
                    <th>CANTIDAD</th>
                    <th>PRECIO</th>
                    <th>COSTO</th>
                    <th>SUBTOTAL</th>
                    <th>GANANCIA</th>
                    <th>FECHA</th>

                </tr>

            </thead>

            <tbody id="tablaVentas"></tbody>

        </table>

    </div>
    
<div class="panel">

    <h2>⚙️ Administrar Ventas</h2>

    <button onclick="exportarVentas()">

        💾 Exportar JSON

    </button>

    <input
    type="file"
    id="importarVentas"
    hidden
    onchange="importarVentas(event)">

    <button
    onclick="
    document
    .getElementById('importarVentas')
    .click()
    ">

    📂 Importar JSON

    </button>

    <button onclick="cerrarCorte()">

        🗑 Cerrar Corte

    </button>

</div>
        
    </div>
    
    <script type="module">

import {
    crearNavbar
}
from "../../components/navbar.js";

document
.getElementById("navbar")
.innerHTML =
crearNavbar();
              
</script>
    
    <script type="module" src="ventas.js"></script>

</body>

</html>
