<!DOCTYPE html>
<html lang="es">

<head>

    <meta name="viewport"

    <title>Dashboard</title>

    <link rel="stylesheet"

</head>

<body>

    <h1>Dashboard</h1>

    <div class="dashboard">

        <div class="card">

            <p id="kpiVentas">0</p>
        </div>

        <div class="card">
            <h3>Ganancia</h3>
            <p id="kpiGanancia">0</p>
        </div>

        <div class="card">
            <h3>Productos</h3>
            <p id="kpiProductos">0</p>
        </div>

        <div class="card">
            <h3>Stock Bajo</h3>
            <p id="kpiStock">0</p>
        </div>

        <div class="card">
            <h3>Valor Inventario</h3>
            <p id="kpiInventario">$0</p>
        </div>

        <div class="card">

            <h3>📦 Piezas</h3>

                0

        </div>

        <div class="card">

            <h3>🛒 Insumos</h3>
        
            <p id="kpiInsumos">
                $0
            </p>
        
        </div>

    <script type="module"
            src="./dashboard.js"></script>

</html>
