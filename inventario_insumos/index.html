<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario e Insumos</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #333;
}

ul {
  list-style: none;
  padding: 0;
  max-width: 500px;
  margin: auto;
}

li {
  background: white;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.nombre {
  font-weight: bold;
}

.valor {
  margin: 0 10px;
  font-size: 18px;
}

button {
  padding: 5px 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.mas {
  background: #28a745;
  color: white;
}

.menos {
  background: #dc3545;
  color: white;
}

.guardar {
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  background: #007bff;
  color: white;
  border-radius: 8px;
}
</style>

</head>
<body>

<h1>📦 Inventario e Insumos</h1>

<ul id="lista"></ul>

<button class="guardar" onclick="exportar()">💾 Guardar archivo</button>

<script>
const items = {
  bolis: 0,
  paletas: 0,
  azucar: 0,
  fruta: 0
};

// Cargar desde localStorage
function cargar() {
  for (let key in items) {
    items[key] = parseFloat(localStorage.getItem(key)) || 0;
  }
}

// Guardar en localStorage
function guardar() {
  for (let key in items) {
    localStorage.setItem(key, items[key]);
  }
}

// Renderizar lista
function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  for (let key in items) {
    const li = document.createElement("li");

    li.innerHTML = `
      <span class="nombre">${key.toUpperCase()}</span>
      <div>
        <button class="menos" onclick="cambiar('${key}', -1)">-1</button>
        <span class="valor">${items[key]}</span>
        <button class="mas" onclick="cambiar('${key}', 1)">+1</button>
      </div>
    `;

    lista.appendChild(li);
  }
}

// Cambiar valores
function cambiar(nombre, cantidad) {
  items[nombre] += cantidad;
  if (items[nombre] < 0) items[nombre] = 0;

  guardar();
  render();
}

// Exportar a archivo JSON
function exportar() {
  const dataStr = JSON.stringify(items, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "inventario.json";
  a.click();
}

// Inicializar
cargar();
render();
</script>

</body>
</html>
