        <!DOCTYPE html>
        <html lang="es">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Sistema Inventario Santa Rosa</title>
        
        <style>
        
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        
        body{
            font-family:Arial, sans-serif;
            background:#f4f6f8;
            padding:20px;
        }
        
        h1{
            text-align:center;
            margin-bottom:20px;
            color:#d81b60;
        }
        
        .contenedor{
            max-width:1400px;
            margin:auto;
        }
        
        .panel{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            margin-bottom:20px;
        }
        
        h2{
            margin-bottom:15px;
            color:#333;
        }
        
        .formulario{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
            gap:10px;
        }
        
        input, select{
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
        }
        
        button{
            border:none;
            border-radius:8px;
            padding:10px;
            cursor:pointer;
            font-weight:bold;
        }
        
        .btn-agregar{
            background:#28a745;
            color:white;
        }
        
        .btn-exportar{
            background:#007bff;
            color:white;
        }
        
        .btn-importar{
            background:#6c757d;
            color:white;
        }
        
        .btn-eliminar{
            background:#dc3545;
            color:white;
            padding:5px 10px;
        }
        
        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
            background:white;
        }
        
        th{
            background:#005b84;
            color:white;
            padding:12px;
            font-size:14px;
        }
        
        td{
            background:white;
            padding:10px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }
        
        .resumen{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:15px;
            margin-bottom:20px;
        }
        
        .card{
            background:white;
            padding:20px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }
        
        .card h3{
            color:#555;
        }
        
        .card p{
            font-size:30px;
            color:#d81b60;
            margin-top:10px;
        }
        
        @media(max-width:768px){
        
            body{
                padding:10px;
            }
        
            table{
                font-size:12px;
            }
        
            th, td{
                padding:8px;
            }
        
        }
        
        </style>
        </head>
        
        <body>
        
        <div class="contenedor">
        
        <h1>🍧 Sistema Santa Rosa</h1>
        
        <div class="resumen">
        
            <div class="card">
                <h3>Total Productos</h3>
                <p id="totalProductos">0</p>
            </div>
        
            <div class="card">
                <h3>Inventario Total</h3>
                <p id="inventarioTotal">0</p>
            </div>
        
            <div class="card">
                <h3>Total Vendido</h3>
                <p id="totalVentas">$0</p>
            </div>
            <div class="card">
                <h3>Ganancia Total</h3>
                <p id="totalGanancia">$0</p>
    </div>
        
    </div>
              
        <div class="panel">
        
        <h2>➕ Agregar Producto</h2>
    
        <div class="formulario">
    
        <input type="text"
        id="nuevoProducto"
        placeholder="Nombre del producto">
    
        <input type="number"
        id="nuevoPrecio"
        placeholder="Precio">
    
        <input type="number"
        id="nuevoCosto"
        placeholder="Costo">
    
        <input type="number"
        id="nuevoStock"
        placeholder="Inventario">
    
        <button class="btn-agregar"
        onclick="agregarProducto()">
        Agregar Producto
        </button>
                
        <button class="btn-eliminar"
        onclick="eliminarProducto()">
        Eliminar Producto
        </button>
            
        </div>
    
    </div>
                
        <div class="panel">

        <h2>📦 Entrada de Inventario</h2>

        <div class="formulario">

            <select id="productoInventario">
            </select>

            <input type="number"
            id="agregarStock"
            placeholder="Cantidad">

            <button class="btn-agregar"
            onclick="agregarInventario()">

    Agregar Inventario

    </button>

        </div>

</div>     
        <div class="panel">
        
        <h2>💰 Registrar Venta</h2>
        
        <div class="formulario">
        
            <select id="producto" 
            onchange="actualizarProducto()">
            </select>
        
            <input type="text"
            id="cliente"
            placeholder="Nombre o teléfono">
        
            <div style="display:flex; gap:5px; align-items:center;">
        
                <button type="button"
                onclick="cambiarCantidad(-1)">
                ➖
                </button>
        
                <input type="number"
                id="cantidad"
                value="1"
                style="width:60px; text-align:center;">
        
                <button type="button"
                onclick="cambiarCantidad(1)">
                ➕
                </button>
        
            </div>
        
            <input type="number"
            id="precio"
            readonly>
        
            <input type="number"
            id="costo"
            readonly>
        
            <input type="text"
            id="descuento"
            placeholder="Descuento opcional">
        
            <button class="btn-agregar"
            onclick="registrarVenta()">
                Registrar Venta
            </button>
        
        </div>
        
        </div>
        
        <div class="panel">
        
        <h2>📋 Historial de Ventas</h2>
        
        <div style="
        overflow-x:auto;
        border-radius:10px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
        ">
        
        <table>
        
        <thead>
        
        <tr>
        <th>PRODUCTO</th>
        <th>CLIENTE</th>
        <th>CANTIDAD</th>
        <th>INVENTARIO</th>
        <th>PRECIO</th>
        <th>COSTO</th>
        <th>SUBTOTAL</th>
        <th>GANANCIA</th>
        <th>DESCUENTO</th>    
        <th>FECHA</th>
        <th>ACCION</th>
        </tr>
        
        </thead>
        
        <tbody id="tablaVentas">
        
        </tbody>
        
        </table>
        
        </div>
        
        <br>
        
        <button class="btn-exportar" onclick="exportarJSON()">
        💾 Exportar JSON
        </button>
            
        <button class="btn-eliminar"
        onclick="cerrarCorte()">
        🗑 Cerrar Corte
            
        </button>
        <input type="file" id="importarArchivo" hidden onchange="importarJSON(event)">
        
        <button class="btn-importar"
        onclick="document.getElementById('importarArchivo').click()">
        📂 Importar JSON
        </button>
        
        </div>
        
        </div>
        
        <script>
        
    let productos = [
    
    {
        nombre:"BOLIS",
        precio:18,
        costo:7,
        stock:0
    },
    
    {
        nombre:"PALETAS",
        precio:20,
        costo:9,
        stock:0
    }
    
    ];   
    
                let ventas = [];
                     function agregarProducto(){    
        
                        const nombre =
                                document.getElementById("nuevoProducto").value;
    
        
                             const precio =       
                                     Number(document.getElementById("nuevoPrecio").value);    
        
                             const costo =       
                                     Number(document.getElementById("nuevoCosto").value);                            
        
                             const stock =        
                                     Number(document.getElementById("nuevoStock").value);
        
                             if(nombre.trim() === ""){           
                                     alert("Escribe un nombre");           
                                     return;      
                             }

        
                             if(precio <= 0){          
                                     alert("Precio inválido");           
                                     return;       
                             }                            

                             if(costo < 0){            
                                     alert("Costo inválido");            
                                     return;       
                             }

        
                             if(stock < 0){           
                                     alert("Inventario inválido");            
                                     return;                                                                          
                             }        
         
                             const existe =            
                                     productos.some(            
                                             p => p.nombre.toLowerCase() === nombre.toLowerCase()           
                                     );    
            
                             
                             if(existe){
    
                                     const productoExistente =    
                                             productos.find(   
                                                     p => p.nombre.toLowerCase() === nombre.toLowerCase()
                                             );
    
                                     productoExistente.stock += stock;
    
                                     productoExistente.precio = precio;
    
                                     productoExistente.costo = costo;
    
                                     guardarLocal();
                                     
                                     actualizarSelectProductos();    
                                     document.getElementById("producto").value = nombre;
                                     
                                     actualizarResumen();
    
                                     actualizarProducto();
    
                                     limpiarNuevoProducto();
    
                                     alert("Producto actualizado");    
                                     return;
                             }
       
                             productos.push({           
                                     nombre,           
                                     precio,
                                     costo,           
                                     stock        
                             });    
        
                             actualizarSelectProductos();        
                             document.getElementById("producto").value = nombre;
        
                             actualizarProducto();         
       
                             guardarLocal();    
        
                             limpiarNuevoProducto();    
        
                             actualizarResumen();   
                     }

                function eliminarProducto(){
                        const nombre =
                                    document.getElementById("producto").value;
                        if(!nombre){ 
                                alert("Selecciona un producto");  
                                return;   
                        }

    
                        if(!confirm("¿Eliminar producto?")){      
                                return;   
                        }   
                        productos =  
                                productos.filter(p => p.nombre !== nombre);
    
                        guardarLocal();
   
                        actualizarSelectProductos();
    
                        actualizarResumen();
    
                        actualizarProducto();
                }

                function agregarInventario(){

                        const nombre =
                                document.getElementById("productoInventario").value;
                        const cantidad =
                                Number(document.getElementById("agregarStock").value);

                        if(cantidad <= 0){

                        alert("Cantidad inválida");
                                        return;
                                
                        }

    
                        const producto =
                                    productos.find(p => p.nombre === nombre);
                        if(!producto){

                                alert("Producto no encontrado");

                                return;
                        }
                        
                        producto.stock += cantidad;
                        ventas.push({
                                producto: nombre,
                                cliente: "ENTRADA INVENTARIO",
                                cantidad: "+" + cantidad,
                                inventario: producto.stock,
                                precio: 0,
                                costo: 0,
                                subtotal: 0,
                                ganancia: 0,
                                descuento: "",
                                fecha: new Date().toLocaleString()
                        });
                        
                        guardarLocal();
                        actualizarResumen();
                        renderTabla();

                        document.getElementById("agregarStock").value = "";

                        alert("Inventario agregado");
                }                
                function guardarLocal(){
        
                        localStorage.setItem(
                                "inventarioSantaRosa",
                                JSON.stringify({
                                        productos,
                                        ventas
                                })
                        );
        
                }
                
                function cargarLocal(){
        
                        const datos = localStorage.getItem("inventarioSantaRosa");
        
                        if(datos){
                                const sistema = JSON.parse(datos);
        
                                productos = sistema.productos || productos;
                                ventas = sistema.ventas || ventas;

                        }
        
                }
              
                function registrarVenta(){
    
                        actualizarProducto();
    
                        const producto =
                                document.getElementById("producto").value;
                        
        const cliente =
                document.getElementById("cliente").value;
                        
        if(cliente.trim() === ""){
                alert("Escribe un cliente");
                return;
        }
    
        const cantidad =
                parseInt(document.getElementById("cantidad").value) || 0;
                        
                        const precio =
                                Number(document.getElementById("precio").value) || 0;
    
                        const costo =
                                Number(document.getElementById("costo").value) || 0;
    
                        const descuento =
                                document.getElementById("descuento").value;
    
                        if(cantidad <= 0){
                                        alert("Cantidad inválida");
                                            return;
                               }
    
                            const productoObj =
                                    productos.find(p => p.nombre === producto);
                                if(cantidad > productoObj.stock){
                                            alert("No hay suficiente inventario");
                                           return;    
                        }
    
        
                        productoObj.stock -= cantidad;
                        const subtotal = cantidad * precio;
                        const ganancia = subtotal - (cantidad * costo);   
                        const fecha = new Date().toLocaleString();

                        ventas.push({
                                producto,
                                cliente,
                                cantidad,
                                inventario: productoObj.stock,
                                precio,
                                costo,
                                subtotal,
                                ganancia,
                                descuento,
                                fecha
                        });
    

                        guardarLocal();
        
                        actualizarResumen();
        
                        renderTabla();

                        limpiarFormulario();
    
        
                        const ultimaFila =
                                document.querySelector("#tablaVentas tr:last-child");

                        if(ultimaFila){
                                ultimaFila.scrollIntoView({
                                        behavior:"smooth"
                                });
                        }
                }
        
    function renderTabla(){
    
        const tabla =
        document.getElementById("tablaVentas");
    
        tabla.innerHTML = "";
    
        ventas.forEach((venta, index)=>{
    
            const precio =
            Number(venta.precio) || 0;
    
            const costo =
            Number(venta.costo) || 0;
    
            const subtotal =
            Number(venta.subtotal) || 0;
    
            const ganancia =
            Number(venta.ganancia) || 0;
    
            tabla.innerHTML += `
    
            <tr>
    
            <td>${venta.producto || ""}</td>
    
            <td>${venta.cliente || ""}</td>
    
            <td>${venta.cantidad || 0}</td>
    
            <td>${venta.inventario || 0}</td>
    
            <td>$${precio.toFixed(2)}</td>
    
            <td>$${costo.toFixed(2)}</td>
    
            <td>$${subtotal.toFixed(2)}</td>
    
            <td>$${ganancia.toFixed(2)}</td>
    
            <td>${venta.descuento || ""}</td>
    
            <td>${venta.fecha || ""}</td>
    
            <td>
                <button class="btn-eliminar"
                onclick="eliminarVenta(${index})">
                X
                </button>
            </td>
    
            </tr>
    
            `;
    
        });
    
    }
        
        function eliminarVenta(index){
                if(!confirm("¿Eliminar movimiento?")){        
                        return;    
                }
    
                const venta = ventas[index];
    
                const producto =    
                        productos.find(p => p.nombre === venta.producto);
    
                if(producto){
                        const cantidad =        
                                Number(venta.cantidad);
        
                        if(venta.cliente === "ENTRADA INVENTARIO"){
                                producto.stock -= cantidad;
                        }else{
                                producto.stock += cantidad;        
                        }    
                }
    
                ventas.splice(index,1);
    
                guardarLocal();
    
                renderTabla();
    
                actualizarResumen();        
        }                
         
                function cerrarCorte(){    
        
                 if(!confirm("¿Cerrar corte y borrar ventas?")){           
                         return;        
                 }    
                        ventas = [];   
                        guardarLocal();       
                        renderTabla();   
                        actualizarResumen();        
                } 
            
    function actualizarResumen(){
    
        document.getElementById("totalProductos")
        .innerText = productos.length;
    
        let inventarioTotal = 0;
    
        productos.forEach(p=>{
    
            inventarioTotal += p.stock;
    
        });
    
        document.getElementById("inventarioTotal")
        .innerText = inventarioTotal;
    
        let total = 0;
    
        let ganancia = 0;
    
        ventas.forEach(v=>{
    
            total += Number(v.subtotal) || 0;
    
            ganancia += Number(v.ganancia) || 0;
    
        });
    
        document.getElementById("totalVentas")
        .innerText = "$" + total.toFixed(2);
    
        document.getElementById("totalGanancia")
        .innerText = "$" + ganancia.toFixed(2);
    
    }
        
        function limpiarFormulario(){
    
        document.getElementById("cliente").value = "";
    
        document.getElementById("cantidad").value = 1;
    
        document.getElementById("descuento").value = "";
    
        actualizarProducto();

        document.getElementById("cliente").focus();
    }
        
        function exportarJSON(){
        
            const datos = {
                productos,
                ventas
            };
        
            const blob = new Blob(
                [JSON.stringify(datos,null,2)],
                {type:"application/json"}
            );
        
            const a = document.createElement("a");
        
            a.href = URL.createObjectURL(blob);
        
           const hoy = new Date();
    
            const fecha =
            hoy.getFullYear() + "-" +
            String(hoy.getMonth()+1).padStart(2,"0") + "-" +
            String(hoy.getDate()).padStart(2,"0");
    
            a.download =
            "santa_rosa_" + fecha + ".json";
        
            a.click();
        
        }
        
        function importarJSON(event){
        
            const archivo = event.target.files[0];
        
            if(!archivo) return;
        
            const lector = new FileReader();
        
            lector.onload = function(e){
        
                const datos =
                    JSON.parse(e.target.result);
        
                productos = datos.productos || productos;
    
                actualizarSelectProductos();
                
                ventas = datos.ventas || ventas;
        
                guardarLocal();
        
                actualizarResumen();
                
                renderTabla();
            };
        
            lector.readAsText(archivo);
        
        }
    
        function actualizarSelectProductos(){

            const selectVenta =
            document.getElementById("producto");

            const selectInventario =
            document.getElementById("productoInventario");

            selectVenta.innerHTML = "";

            selectInventario.innerHTML = "";

            productos.forEach(p=>{

                const option = `
                <option value="${p.nombre}">
                ${p.nombre}
                </option>
                `;

                selectVenta.innerHTML += option;

                selectInventario.innerHTML += option;

            });

        }
            
    function actualizarProducto(){
    
        const nombre =
        document.getElementById("producto").value;
    
        const producto =
        productos.find(p => p.nombre === nombre);
    
        if(producto){
    
                document.getElementById("precio").value =
                producto.precio;
    
                document.getElementById("costo").value =
                producto.costo;
                
        }else{

                document.getElementById("precio").value = "";

                document.getElementById("costo").value = "";

    
        }
    
    }
            
    
        function limpiarNuevoProducto(){
    
        document.getElementById("nuevoProducto").value = "";
    
        document.getElementById("nuevoPrecio").value = "";
    
        document.getElementById("nuevoCosto").value = "";
    
        document.getElementById("nuevoStock").value = "";
    
    }
        function cambiarCantidad(valor){
    
            const input =
            document.getElementById("cantidad");
    
            let cantidad =
            parseInt(input.value) || 1;
    
            cantidad += valor;
    
            if(cantidad < 1){
            cantidad = 1;
        }
    
            input.value = cantidad;
    
    }
        cargarLocal();
    
        actualizarSelectProductos();
            
        renderTabla();
        
        actualizarResumen();
        
        actualizarProducto();
    
    
    
    document.getElementById("descuento")
    .addEventListener("keydown", function(e){
    
        if(e.key === "Enter"){
    
            e.preventDefault();
    
            registrarVenta();
    
        }
    
    });
            
        </script>
    
    </body>
    </html>
